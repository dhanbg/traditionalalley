version: "3.8"

services:
  nextjs:
    image: docker.io/traditionalalley/ta-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://admin.traditionalalley.com.np
        - NEXT_PUBLIC_STRAPI_API_TOKEN=53a5a13bf33757eb9d5d8fea2d721742ecc5ff24562b0858f073feb6818a2a9c3ba8d052e6c143222c01d504cdfd85500c307502f01655929a8c4a6b2ed84b6096e0539d71b920e84551459e3049b1f452647911330b6de4bcbcc655e727f38ace8d0802a010c75628f1d792fcf047c77efeced311b1248fc09b32e2614da62a
    container_name: nextjs-alley-production
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      STRAPI_INTERNAL_URL: "http://strapi-alley-production:1337"
      # Runtime environment variables
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      KHALTI_BASE_URL: ${KHALTI_BASE_URL}
      KHALTI_SECRET_KEY: ${KHALTI_SECRET_KEY}
      KHALTI_PUBLIC_KEY: ${KHALTI_PUBLIC_KEY}
      KHALTI_RETURN_URL: ${KHALTI_RETURN_URL}
      KHALTI_WEBSITE_URL: ${KHALTI_WEBSITE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_STRAPI_API_TOKEN: ${NEXT_PUBLIC_STRAPI_API_TOKEN}
      # NextAuth configuration
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # SMTP Configuration (Gmail for OTP emails)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # Hostinger SMTP for invoice emails
      HOSTINGER_SMTP_HOST: ${HOSTINGER_SMTP_HOST}
      HOSTINGER_SMTP_PORT: ${HOSTINGER_SMTP_PORT}
      HOSTINGER_SMTP_USER: ${HOSTINGER_SMTP_USER}
      HOSTINGER_SMTP_PASS: ${HOSTINGER_SMTP_PASS}
      HOSTINGER_SMTP_FROM: ${HOSTINGER_SMTP_FROM}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - strapi-network

networks:
  strapi-network:
    external: true
    name: strapi-production_strapi-production-network
